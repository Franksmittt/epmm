<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapid Studio · Layout 1 — Bottom Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rs-red-overlay: rgba(215, 10, 10, 0.92);
      --rs-red-solid: #d70a0a;
      --rs-red-hover: #ff1a1a;
      --rs-white: #ffffff;
      --rs-black: #000000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Montserrat, system-ui, sans-serif;
      background: #1a1a1a;
      color: #e5e5e5;
      padding: 24px;
    }
    .page-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 8px;
    }
    .page-note {
      font-size: 0.85rem;
      color: #a1a1aa;
      max-width: 36rem;
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .editor {
      display: inline-flex;
      flex-direction: column;
      gap: 15px;
      background: #2a2a2a;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #444;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    }
    .controls label {
      display: block;
      color: #aaa;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .controls input[type="file"] {
      font-size: 0.75rem;
      color: white;
    }
    .story-card {
      width: 270px;
      height: 480px;
      background-color: var(--rs-black);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .inner-frame {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      z-index: 20;
      pointer-events: none;
    }
    .bg-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .text-center { text-align: center; }
    .text-white { color: var(--rs-white); }
    .font-black { font-weight: 900; }
    .x-mark {
      font-size: 0.6rem;
      margin: 0 8px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
    }
    .badge {
      display: inline-block;
      border: 1px solid var(--rs-white);
      padding: 2px 8px;
      font-size: 0.5rem;
      font-weight: 600;
      margin-top: 5px;
    }
    .shop-btn {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--rs-white);
      color: var(--rs-black);
      border: none;
      padding: 6px 20px;
      font-weight: 800;
      font-size: 0.6rem;
      z-index: 25;
      font-family: inherit;
      cursor: default;
    }
    .t1-bottom {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 35%;
      background: var(--rs-red-overlay);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 20px;
    }
    [contenteditable="true"] {
      outline: none;
      border-radius: 2px;
    }
    [contenteditable="true"]:hover,
    [contenteditable="true"]:focus {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <h1 class="page-title">Rapid Studio — Layout 1: Bottom Bar</h1>
  <p class="page-note">
    Standalone HTML matching the app’s first story card. Replace the background via the file input; edit headline and badges inline.
  </p>

  <div class="editor">
    <div class="controls">
      <label for="upload-bg">Background image</label>
      <input type="file" id="upload-bg" accept="image/*" />
    </div>

    <div class="story-card" id="card-1">
      <div class="inner-frame" aria-hidden="true"></div>
      <img
        src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=400&q=80"
        id="img-1"
        class="bg-img"
        alt="Background"
      />
      <div class="t1-bottom text-white text-center">
        <span contenteditable="true" style="font-size: 0.5rem; font-weight: 600;">#WILDSTYLE</span>
        <h1 class="font-black" style="font-size: 1.3rem; margin: 5px 0;">
          <span class="x-mark" contenteditable="false">x</span>
          <span contenteditable="true">NEW ARRIVAL</span>
          <span class="x-mark" contenteditable="false">x</span>
        </h1>
        <span contenteditable="true" class="badge">GET 50% OFF</span>
      </div>
      <button type="button" class="shop-btn" contenteditable="true">SHOP NOW</button>
    </div>
  </div>

  <script>
    document.getElementById("upload-bg").addEventListener("change", function (e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        var img = document.getElementById("img-1");
        if (img) img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
